version: "3.9"

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &healthcheck
  interval: 15s
  timeout: 5s
  retries: 3

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@elite-decision.io"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    labels:
      - "traefik.http.routers.api.rule=Host(`api.elite-decision.io`)"
      - "traefik.http.routers.api.service=api@docker"
      - "traefik.http.routers.dashboard.rule=Host(`app.elite-decision.io`)"
      - "traefik.http.routers.dashboard.service=dashboard@docker"
    logging: *logging
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: &db_user postgres
      POSTGRES_PASSWORD: &db_password ${DB_PASSWORD:?}
      POSTGRES_DB: &db_name decision_engine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      <<: *healthcheck
    logging: *logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck
    logging: *logging
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      API_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-decision_engine}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}
      CORS_ORIGINS: https://app.elite-decision.io
      LOG_LEVEL: info
      METRICS_ENABLED: "true"
      OTEL_ENABLED: "true"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    labels:
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    logging: *logging
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    logging: *logging
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    logging: *logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    labels:
      - "traefik.http.routers.grafana.rule=Host(`monitor.elite-decision.io`)"
      - "traefik.http.routers.grafana.service=grafana@docker"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    logging: *logging
    restart: unless-stopped

  backup:
    image: alpine:3.20
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql16-client aws-cli
        echo "0 3 * * * /scripts/backup.sh" | crontab -
        crond -f
    environment:
      DB_HOST: db
      DB_USER: *db_user
      DB_PASSWORD: *db_password
      DB_NAME: *db_name
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?}
      S3_BUCKET: ${S3_BUCKET:?}
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    depends_on:
      db: { condition: service_healthy }
    logging: *logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  prometheus:
  grafana:
